<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SMS CRM FULL SYSTEM</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  height:100vh;
  background:#0b1220;
  color:white;
}

.left { width:28%; background:#111827; overflow:auto; border-right:1px solid #222; }
.middle { width:52%; display:flex; flex-direction:column; }
.right { width:20%; background:#111827; overflow:auto; padding:8px; font-size:11px; }

.top { padding:10px; border-bottom:1px solid #222; display:flex; gap:6px; }

.top input {
  flex:1;
  padding:6px;
  border:none;
  border-radius:6px;
}

.top button {
  padding:6px 10px;
  background:#3b82f6;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.item {
  padding:10px;
  border-bottom:1px solid #222;
  cursor:pointer;
}

.chat { flex:1; padding:10px; overflow:auto; }

.msg {
  margin:8px 0;
  padding:8px;
  border-radius:8px;
  max-width:70%;
}

.me { background:#2563eb; margin-left:auto; }
.them { background:#374151; }

.input {
  display:flex;
  padding:10px;
  background:#1f2937;
}

input { flex:1; padding:8px; border:none; border-radius:6px; }

button {
  margin-left:8px;
  padding:8px 12px;
  background:#22c55e;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="left">
  <div class="top">
    <input id="newNumber" placeholder="Enter number">
    <button onclick="createChat()">+</button>
  </div>
  <div id="sessions"></div>
</div>

<div class="middle">

  <div style="padding:10px;background:#1f2937;">💬 SMS CRM SYSTEM</div>

  <div class="chat" id="chat"></div>

  <div class="input">
    <input id="msg" placeholder="Type message..." />
    <button onclick="send()">Send</button>
  </div>

</div>

<div class="right">
  <h3>CRM</h3>
  <div>Current: <span id="currentNumber">None</span></div>
</div>

<script>

let currentNumber = null;
let messages = [];

/* ======================
   创建会话
====================== */
function createChat() {
  const num = document.getElementById("newNumber").value;
  if(!num) return;

  currentNumber = num;
  document.getElementById("currentNumber").innerText = num;

  openChat(num);
  updateSessions();
}

/* ======================
   打开聊天
====================== */
function openChat(num) {
  currentNumber = num;
  document.getElementById("currentNumber").innerText = num;

  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  const list = messages.filter(m => m.to === num || m.from === num);

  if(list.length === 0) {
    chat.innerHTML = "No messages yet";
    return;
  }

  list.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + (m.type === "outgoing" ? "me" : "them");
    div.innerText = m.message;
    chat.appendChild(div);
  });
}

/* ======================
   发送短信（已修复🔥）
====================== */
async function send() {

  const msg = document.getElementById("msg").value;
  if(!currentNumber || !msg) return;

  await fetch("/send", {   // ✅ 修复点：不再用localhost
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      to: currentNumber,
      message: msg
    })
  });

  messages.push({
    type:"outgoing",
    to: currentNumber,
    message: msg
  });

  openChat(currentNumber);

  document.getElementById("msg").value = "";
}

/* ======================
   拉取消息
====================== */
async function load() {
  const res = await fetch("/messages");
  messages = await res.json();

  if(currentNumber) openChat(currentNumber);
}

setInterval(load, 2000);
load();

</script>

</body>
</html>
